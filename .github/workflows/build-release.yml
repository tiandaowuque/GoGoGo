name: Build Release
on:
  workflow_dispatch:

jobs:
  Build:
    name: Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      # 关键修复：删除报错的代码行
      - name: Fix compile error
        run: |
          sed -i '/setIgnoreCacheException/d' app/src/main/java/com/zcshou/gogogo/MainActivity.java

      - name: Create local.properties
        run: |
          cat << EOF > local.properties
          MAPS_API_KEY="7fG7WHIjEDXLQHEc5XqPl4boBugBJmXy"
          MAPS_SAFE_CODE="test"
          EOF

      - name: Build APK
        run: bash ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GoGoGo-APK
          path: app/build/outputs/apk/release/*.apk
